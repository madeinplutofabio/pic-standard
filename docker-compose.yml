services:
  pic-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pic-cli-serve
    ports:
      - "7580:7580"
    environment:
      PIC_POLICY_PATH: /config/pic_policy.json
      PIC_KEYS_PATH: /config/pic_keys.json
    volumes:
      - ./pic_policy.json:/config/pic_policy.json:ro
      - ./pic_keys.example.json:/config/pic_keys.json:ro
      - ./sdk-python:/workspace:ro
    restart: unless-stopped

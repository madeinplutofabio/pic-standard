name: CI

on:
  push:
  pull_request:

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        deps: ["pinned"]
        include:
          - python-version: "3.12"
            deps: "latest"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            sdk-python/requirements.txt
            sdk-python/requirements-dev.txt
            sdk-python/requirements-langgraph.txt
            sdk-python/requirements-mcp.txt

      - name: Install dependencies (pinned)
        if: matrix.deps == 'pinned'
        run: |
          python -m pip install --upgrade pip
          pip install -r sdk-python/requirements.txt \
                      -r sdk-python/requirements-dev.txt \
                      -r sdk-python/requirements-langgraph.txt \
                      -r sdk-python/requirements-mcp.txt

      # "latest" canary within our currently intended support windows
      # (not a formal support statement — adjust bounds as needed)
      - name: Install dependencies (latest)
        if: matrix.deps == 'latest'
        run: |
          python -m pip install --upgrade pip
          pip install -r sdk-python/requirements.txt \
                      -r sdk-python/requirements-dev.txt
          pip install --upgrade \
            "langchain-core>=0.1,<1" \
            "langgraph>=1,<2" \
            "mcp>=1.25,<2"

      # OpenSSF Passing-tier: coding standards enforced.
      # Ruff lint (rule sets: E F W I N B SIM RUF — see pyproject.toml).
      - name: Lint check (ruff)
        run: ruff check sdk-python/ tests/ conformance/

      # OpenSSF Passing-tier: coding standards enforced.
      # Ruff format drift check (no auto-write; fails if anything would change).
      - name: Format check (ruff)
        run: ruff format --check sdk-python/ tests/ conformance/

      # OpenSSF Passing-tier: ≥80% statement coverage (Python).
      # `coverage run` wraps pytest; `--fail-under=80` is the gate.
      # Config (source, excludes, threshold) lives in pyproject.toml.
      - name: Run tests with coverage gate
        env:
          PYTHONPATH: ${{ github.workspace }}/sdk-python
        run: |
          coverage run -m pytest -q
          coverage report --fail-under=80

  test-openclaw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: integrations/openclaw/package-lock.json

      - name: Install dependencies
        working-directory: integrations/openclaw
        run: npm install

      # OpenSSF Passing-tier: coding standards enforced.
      # Prettier format drift check (no auto-write).
      - name: Format check (prettier)
        working-directory: integrations/openclaw
        run: npm run format:check

      # OpenSSF Passing-tier: coding standards enforced.
      # ESLint v9 flat config (eslint.config.mjs) — typescript-eslint
      # recommended (non-type-checked variant) + project overrides.
      - name: Lint (eslint)
        working-directory: integrations/openclaw
        run: npm run lint

      - name: Type check
        working-directory: integrations/openclaw
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: integrations/openclaw
        run: npx vitest run
